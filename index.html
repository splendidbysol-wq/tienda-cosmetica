<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mi Tienda</title>

  <!-- PWA: manifest -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#221F1D" />

  <!-- Tipografía -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />

  <!-- PWA: soporte específico de iOS/Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tienda" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>

  <header id="hero">
    <div id="hero-fondo"></div>
    <div class="hero-contenido">
      <img id="logo-negocio" class="oculto" alt="Logo" />
      <span class="eyebrow">Catálogo</span>
      <h1 id="nombre-negocio">Mi Tienda</h1>
    </div>
  </header>

  <main id="catalogo">
    <!-- Acá se renderiza el catálogo de productos dinámicamente -->
    <p>Cargando catálogo...</p>
  </main>

  <!-- Botón flotante del carrito -->
  <button id="boton-abrir-carrito" class="boton-carrito-flotante">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <span id="contador-carrito">0</span>
  </button>

  <!-- Drawer del carrito -->
  <div id="fondo-drawer" class="fondo-drawer oculto"></div>
  <aside id="drawer-carrito" class="drawer-carrito oculto">
    <div class="drawer-header">
      <h2>Tu pedido</h2>
      <button id="boton-cerrar-carrito" class="boton-cerrar-icono">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div id="items-carrito">
      <p>Tu carrito está vacío.</p>
    </div>

    <div class="drawer-footer">
      <div class="total-carrito">
        Total: <strong id="total-carrito">$0</strong>
      </div>
      <button id="boton-ir-checkout" class="boton-principal">Confirmar pedido</button>
    </div>
  </aside>

  <!-- Formulario de checkout -->
  <div id="fondo-checkout" class="fondo-drawer oculto"></div>
  <aside id="drawer-checkout" class="drawer-carrito oculto">
    <div class="drawer-header">
      <h2>Confirmar pedido</h2>
      <button id="boton-cerrar-checkout" class="boton-cerrar-icono">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <form id="form-checkout">
      <label>
        Nombre y apellido
        <input type="text" id="checkout-nombre" required />
      </label>
      <label>
        Teléfono
        <input type="tel" id="checkout-telefono" required />
      </label>
      <label>
        Dirección (si es con envío)
        <input type="text" id="checkout-direccion" />
      </label>
      <label>
        Método de pago
        <select id="checkout-metodo-pago">
          <option value="efectivo">Efectivo</option>
          <option value="transferencia">Transferencia</option>
          <option value="mercadopago">Mercado Pago (a coordinar)</option>
        </select>
      </label>

      <button type="submit" class="boton-principal">Confirmar pedido</button>
      <p id="estado-checkout" class="estado"></p>
    </form>
  </aside>

  <!-- Banner de instalación para iOS (Safari no muestra el prompt automático) -->
  <div id="banner-instalar-ios" class="banner-instalar oculto">
    <p>📲 Para instalar esta app: tocá <strong>Compartir</strong> y luego
      <strong>"Agregar a pantalla de inicio"</strong>.</p>
    <button id="cerrar-banner-ios">Entendido</button>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/tema.js"></script>
  <script type="module" src="js/productos.js"></script>
  <script type="module" src="js/carrito-ui.js"></script>
  <script src="js/pwa-ios.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
